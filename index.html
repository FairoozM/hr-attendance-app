<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var hash = (location.hash || '').replace(/^#/, '')
          var onLogin = hash.indexOf('/login') === 0
          var key = 'hr-attendance-theme'
          var pref = localStorage.getItem(key)
          var dark = onLogin
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
            : pref === 'dark'
              ? true
              : pref === 'light'
                ? false
                : window.matchMedia('(prefers-color-scheme: dark)').matches
          var root = document.documentElement
          root.dataset.theme = dark ? 'dark' : 'light'
          root.style.colorScheme = dark ? 'dark' : 'light'
          root.classList.toggle('dark', dark)
        } catch (e) {}
      })()
    </script>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Font loading: preconnect for faster DNS + TLS, then non-blocking font load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- font-display=swap prevents render blocking; only 3 weights loaded -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <title>Business Intelligence (BI) - Life Smile</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="/api-runtime-config.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
